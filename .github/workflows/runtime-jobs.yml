name: Runtime Jobs

on:
  schedule:
    # Regular autonomous backend runtime (UTC)
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      job_mode:
        description: "Run a single JOB_MODE or all"
        required: true
        default: all
        type: choice
        options:
          - all
          - scan_cycle
          - monitor_cycle
          - notify_cycle
          - digest_cycle
          - outcome_cycle

permissions:
  contents: read

concurrency:
  group: runtime-jobs-${{ github.ref }}-${{ github.event_name }}-${{ github.event.inputs.job_mode || 'all' }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set JOB_MODE matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          EVENT_NAME="${{ github.event_name }}"
          INPUT_MODE="${{ github.event.inputs.job_mode || 'all' }}"

          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$INPUT_MODE" != "all" ]]; then
            MATRIX_JSON=$(printf '{"job_mode":["%s"]}' "$INPUT_MODE")
          else
            MATRIX_JSON='{"job_mode":["scan_cycle","monitor_cycle","notify_cycle","digest_cycle","outcome_cycle"]}'
          fi

          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "[runtime-jobs][plan] event=$EVENT_NAME input_mode=$INPUT_MODE matrix=$MATRIX_JSON"

  run:
    name: Run ${{ matrix.job_mode }}
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
      JOB_MODE: ${{ matrix.job_mode }}

      # Required runtime secrets
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # Optional runtime tuning (repo vars)
      SCANNER_SEEDS: ${{ vars.SCANNER_SEEDS }}
      SCANNER_MAX_ITEMS: ${{ vars.SCANNER_MAX_ITEMS }}
      USE_BIRDEYE_TRENDING: ${{ vars.USE_BIRDEYE_TRENDING }}
      BIRDEYE_LIMIT: ${{ vars.BIRDEYE_LIMIT }}
      JOB_LOCK_TTL_SEC: ${{ vars.JOB_LOCK_TTL_SEC }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Runtime preflight
        shell: bash
        continue-on-error: false
        run: |
          set -euo pipefail

          echo "[runtime-jobs][preflight] mode=${JOB_MODE} ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "[runtime-jobs][preflight] env JOB_MODE_set=$([[ -n "${JOB_MODE:-}" ]] && echo true || echo false)"
          echo "[runtime-jobs][preflight] env SUPABASE_URL_set=$([[ -n "${SUPABASE_URL:-}" ]] && echo true || echo false)"
          echo "[runtime-jobs][preflight] env SUPABASE_SERVICE_ROLE_KEY_set=$([[ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]] && echo true || echo false)"
          echo "[runtime-jobs][preflight] env TG_BOT_TOKEN_set=$([[ -n "${TG_BOT_TOKEN:-}" ]] && echo true || echo false)"
          echo "[runtime-jobs][preflight] env TG_CHAT_ID_set=$([[ -n "${TG_CHAT_ID:-}" ]] && echo true || echo false)"

          python -m py_compile worker.py app.py

          python - <<'PY'
          import json
          import os
          import sys

          print("[runtime-jobs][preflight] import_app:start", flush=True)
          try:
              import app
          except Exception as e:
              print(f"::error::[runtime-jobs][preflight] import_error:{type(e).__name__}:{e}", flush=True)
              sys.exit(11)
          print("[runtime-jobs][preflight] import_app:ok", flush=True)

          required_env = [
              "JOB_MODE",
              "SUPABASE_URL",
              "SUPABASE_SERVICE_ROLE_KEY",
              "TG_BOT_TOKEN",
              "TG_CHAT_ID",
          ]
          missing_env = [k for k in required_env if not str(os.getenv(k, "")).strip()]
          if missing_env:
              print(f"::error::[runtime-jobs][preflight] missing_env:{','.join(missing_env)}", flush=True)
              sys.exit(12)

          try:
              contract = app.check_runtime_contract()
          except Exception as e:
              print(f"::error::[runtime-jobs][preflight] runtime_contract_error:{type(e).__name__}:{e}", flush=True)
              sys.exit(13)

          failures = contract.get("failures")
          failure_tables = []
          if isinstance(failures, list):
              for item in failures:
                  if isinstance(item, dict):
                      table = str(item.get("table") or "").strip()
                      if table:
                          failure_tables.append(table)
          expected_entities = ["runtime_state", "locks", "tg_state", "job_heartbeats", "job_runs"]
          missing_entities = [name for name in expected_entities if name in set(failure_tables)]
          safe_contract = {
              "ok": bool(contract.get("ok")),
              "code": str(contract.get("code") or ""),
              "detail": str(contract.get("detail") or contract.get("message") or ""),
              "missing_entities": missing_entities,
              "failures": failures if isinstance(failures, (list, dict, str)) else str(failures or ""),
          }
          print("[runtime-jobs][preflight] runtime_contract=" + json.dumps(safe_contract, ensure_ascii=False), flush=True)

          if not contract.get("ok"):
              print(
                  "::error::[runtime-jobs][preflight] runtime_contract_error:"
                  + str(contract.get("code") or "unknown")
                  + ":"
                  + ",".join(missing_entities or ["unknown"]),
                  flush=True,
              )
              sys.exit(14)

          print("[runtime-jobs][preflight] ok", flush=True)
          PY

      - name: Runtime start/heartbeat/finish/fail logs
        shell: bash
        continue-on-error: false
        run: |
          set -euo pipefail

          echo "[runtime-jobs] start mode=${JOB_MODE} run_id=${GITHUB_RUN_ID} attempt=${GITHUB_RUN_ATTEMPT} ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          heartbeat() {
            while true; do
              sleep 30
              echo "[runtime-jobs] heartbeat mode=${JOB_MODE} ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            done
          }

          heartbeat &
          HB_PID=$!

          cleanup() {
            kill "$HB_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          if python worker.py; then
            echo "[runtime-jobs] finish mode=${JOB_MODE} ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            CODE=$?
            echo "[runtime-jobs] fail mode=${JOB_MODE} exit_code=${CODE} ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            exit "$CODE"
          fi
